<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 · Signal lost — DeepShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=8"/>
<link rel="stylesheet" href="pages.css?v=8"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>
<body class="ds-page">
<div id="ds-bg-surface"></div>
<div id="root"></div>
<script type="text/babel" src="shared-nav.jsx"></script>
<script type="text/babel">
function NotFound() {
  const { SharedNav, SharedFooter } = window.DSShared;
  return (
    <>
      <SharedNav />
      <section className="nf-shell">
        <div className="nf-bg">
          <div className="nf-noise"/>
          {Array.from({length: 40}).map((_,i)=>(
            <span key={i} className="nf-scan" style={{top:`${(i/40)*100}%`, animationDelay:`${i*0.05}s`}}/>
          ))}
        </div>
        <div className="nf-inner">
          <div className="nf-glitch">
            <span className="eyebrow">error 404</span>
            <h1 className="display nf-num">
              <span style={{color:"var(--ds-brand)"}}>4</span>
              <span className="italic">0</span>
              <span style={{color:"var(--ds-brand-2)"}}>4</span>
            </h1>
            <h2 className="display italic">Signal lost.</h2>
            <p className="nf-sub">The page you were looking for couldn't be verified — no source match, no cached hash, no temporal trail. It may have moved, or it may never have existed.</p>
            <div className="nf-console mono">
              <div className="nf-line">&gt; resolve <b>{typeof window!=="undefined"?window.location.pathname:"/unknown"}</b></div>
              <div className="nf-line">&gt; lookup cache <span style={{color:"var(--ds-danger)"}}>MISS</span></div>
              <div className="nf-line">&gt; cross-reference trusted sources <span style={{color:"var(--ds-danger)"}}>0 matches</span></div>
              <div className="nf-line">&gt; fallback: return verdict <span style={{color:"var(--ds-warn)"}}>404 NOT_FOUND</span></div>
            </div>
            <div className="nf-cta">
              <a href="DeepShield.html" className="btn btn-primary btn-lg btn-shiny" style={{textDecoration:"none"}}>← Back to home</a>
              <a href="Analyze.html" className="btn btn-glass btn-lg" style={{textDecoration:"none"}}>Analyze media →</a>
            </div>
          </div>
        </div>
      </section>
      <SharedFooter />
    </>
  );
}
function mountNF(){
  if(window.DSShared) ReactDOM.createRoot(document.getElementById("root")).render(<NotFound/>);
  else setTimeout(mountNF,50);
}
mountNF();
</script>
  <script src="dotted-surface.js"></script>
</body>
</html>
